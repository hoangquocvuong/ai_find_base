workflows:

  android-workflow:

    name: AI Find Base Android

    environment:

      flutter: stable

    scripts:

      - flutter pub get

      - flutter build appbundle --release

    artifacts:

      - build/app/outputs/bundle/release/*.aab



  ios-workflow:

    name: AI Find Base iOS

    instance_type: mac_mini_m2

    environment:

      flutter: stable

      ios_signing:

        distribution_type: app_store

        bundle_identifier: com.cocbase.aifindbase

    scripts:

      - flutter pub get

      - flutter build ipa --release

    artifacts:

      - build/ios/ipa/*.ipa